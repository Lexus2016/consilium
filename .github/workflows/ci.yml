name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 -m unittest discover -s tests -v
      - run: pip install ruff
      - run: ruff check .

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n bin/consult
      - run: bash -n install.sh
      - run: bash -n clients/claude-code/hooks/consult-nudge.sh
